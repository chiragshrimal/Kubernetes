apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: chiragshrimal/backend:4

          ports:
            - containerPort: 3000

          # env:
          #   - name: PORT
          #     valueFrom:
          #       configMapKeyRef:
          #         name: backend-config
          #         key: port
          #   - name: DATABASE_URL
          #     valueFrom:
          #       secretKeyRef:
          #         name: backend-secret
          #         key: database_url

          volumeMounts:
            - name: env-file
              readOnly: true
              mountPath: "/app/secret"

      volumes:
        - name: env-file
          secret:
            secretName: backend-secret